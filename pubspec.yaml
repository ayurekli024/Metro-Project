name: ankara_metro_tracker
description: Ankara Metrosu sensör tabanlı takip ve navigasyon uygulaması.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^6.1.1
  provider: ^6.1.1
  vibration: ^3.1.8
  intl: ^0.19.0
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_activity_recognition: 4.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/ankararailwaysystem.sql
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png" # Elindeki herhangi bir resmi ikon yapabilirsin
  min_sdk_android: 21

